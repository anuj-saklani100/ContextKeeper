<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--vscode-font-family);
    font-size: 13px;
    background: var(--vscode-sideBar-background);
    color: var(--vscode-foreground);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Toolbar ── */
  #toolbar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px;
    background: var(--vscode-editorGroupHeader-tabsBackground);
    flex-shrink: 0;
  }
  #toolbar button {
    padding: 4px 10px;
    cursor: pointer;
    border: none;
    border-radius: 4px;
    font-size: 12px;
    background: var(--vscode-button-background);
    color: var(--vscode-button-foreground);
  }
  #toolbar button:hover { filter: brightness(1.15); }
  #model-badge {
    margin-left: auto;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--vscode-badge-background);
    color: var(--vscode-badge-foreground);
    white-space: nowrap;
  }

  /* ── Sessions bar ── */
  #sessions-bar {
    padding: 6px 8px;
    border-bottom: 1px solid var(--vscode-panel-border);
    display: flex;
    gap: 6px;
    overflow-x: auto;
    flex-shrink: 0;
  }
  .session-chip {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 11px;
    white-space: nowrap;
    border: 1px solid transparent;
    background: var(--vscode-badge-background);
    color: var(--vscode-badge-foreground);
  }
  .session-chip.active { border-color: var(--vscode-focusBorder); }
  .session-chip .del { opacity: 0.5; margin-left: 2px; font-size: 10px; }
  .session-chip .del:hover { opacity: 1; color: red; }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg {
    padding: 8px 12px;
    border-radius: 8px;
    max-width: 92%;
    line-height: 1.6;
    word-break: break-word;
  }
  .msg.user {
    align-self: flex-end;
    background: var(--vscode-button-background);
    color: var(--vscode-button-foreground);
  }
  .msg.assistant {
    align-self: flex-start;
    background: var(--vscode-editor-inactiveSelectionBackground);
  }
  .msg.thinking { align-self: flex-start; opacity: .5; font-style: italic; }
  .msg.error    { background: #5a1d1d; color: #f48771; }
  .msg .meta    { font-size: 10px; opacity: .5; margin-top: 4px; }

  .summary-banner {
    padding: 6px 12px;
    font-size: 11px;
    opacity: .6;
    font-style: italic;
    border-left: 3px solid var(--vscode-focusBorder);
    margin-bottom: 4px;
  }

  pre {
    background: var(--vscode-textCodeBlock-background);
    padding: 10px;
    border-radius: 4px;
    overflow-x: auto;
    margin-top: 6px;
  }
  code { font-family: var(--vscode-editor-font-family); font-size: 12px; }

  /* ── Input ── */
  #input-area {
    display: flex;
    gap: 6px;
    padding: 8px;
    border-top: 1px solid var(--vscode-panel-border);
    flex-shrink: 0;
  }
  #input {
    flex: 1;
    padding: 7px 10px;
    border-radius: 6px;
    resize: none;
    min-height: 38px;
    max-height: 120px;
    background: var(--vscode-input-background);
    color: var(--vscode-input-foreground);
    border: 1px solid var(--vscode-input-border);
    font-family: inherit;
    font-size: 13px;
  }
  #send {
    padding: 7px 14px;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    background: var(--vscode-button-background);
    color: var(--vscode-button-foreground);
  }
  #send:hover { filter: brightness(1.15); }
</style>
</head>
<body>

<div id="toolbar">
  <button onclick="post('newSession')">＋ New</button>
  <button onclick="post('switchModel')">⇄ Model</button>
  <span id="model-badge">—</span>
</div>

<div id="sessions-bar"></div>
<div id="messages"></div>

<div id="input-area">
  <textarea id="input" rows="2" placeholder="Ask anything… (Shift+Enter for newline)"></textarea>
  <button id="send" onclick="send()">Send</button>
</div>

<script>
  const vscode    = acquireVsCodeApi();
  const msgsEl    = document.getElementById('messages');
  const inputEl   = document.getElementById('input');
  const badgeEl   = document.getElementById('model-badge');
  const sessEl    = document.getElementById('sessions-bar');
  let thinkEl     = null;
  let currentSession = 'default';
  let sessions    = [];

  // ── Send to extension ──────────────────────────────────────────────────────
  function post(type, extra = {}) { vscode.postMessage({ type, ...extra }); }

  function send() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    post('chat', { text });
  }

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  // ── Render a message bubble ────────────────────────────────────────────────
  function addMsg(role, text, meta = '') {
    const d = document.createElement('div');
    d.className = 'msg ' + role;
    d.innerHTML = fmt(text);
    if (meta) d.innerHTML += `<div class="meta">${meta}</div>`;
    msgsEl.appendChild(d);
    msgsEl.scrollTop = msgsEl.scrollHeight;
    return d;
  }

  function fmt(t) {
    return t
      .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
      .replace(/\n/g, '<br>');
  }

  // ── Render session chips ───────────────────────────────────────────────────
  function renderSessions() {
    sessEl.innerHTML = '';
    sessions.forEach(s => {
      const c = document.createElement('div');
      c.className = 'session-chip' + (s.id === currentSession ? ' active' : '');
      c.innerHTML = `<span>${s.id}</span><span class="del" data-id="${s.id}">✕</span>`;
      c.querySelector('span:first-child').onclick = () => {
        currentSession = s.id;
        post('selectSession', { id: s.id });
        renderSessions();
      };
      c.querySelector('.del').onclick = e => {
        e.stopPropagation();
        if (confirm(`Delete session "${s.id}"?`)) post('deleteSession', { id: s.id });
      };
      sessEl.appendChild(c);
    });
  }

  // ── Handle messages from extension ────────────────────────────────────────
  window.addEventListener('message', ({ data }) => {
    switch (data.type) {

      case 'sessions':
        sessions = data.sessions;
        renderSessions();
        break;

      case 'history':
        msgsEl.innerHTML = '';
        currentSession = data.sessionId;
        if (data.summary) {
          const b = document.createElement('div');
          b.className = 'summary-banner';
          b.textContent = '📋 Earlier context summarized: ' + data.summary.slice(0, 120) + '…';
          msgsEl.appendChild(b);
        }
        data.messages.forEach(m => addMsg(m.role, m.content));
        renderSessions();
        break;

      case 'userMessage':
        addMsg('user', data.text);
        break;

      case 'thinking':
        thinkEl = addMsg('thinking', '⏳ thinking…');
        break;

      case 'reply':
        thinkEl?.remove(); thinkEl = null;
        addMsg('assistant', data.text, `${data.model} · ${data.turns} turns`);
        badgeEl.textContent = data.model;
        break;

      case 'error':
        thinkEl?.remove(); thinkEl = null;
        addMsg('error', '⚠ ' + data.text);
        break;

      case 'modelSwitched':
        badgeEl.textContent = data.model;
        const note = data.contextSessions.length
          ? `Context loaded from: ${data.contextSessions.join(', ')}`
          : 'No extra context injected';
        addMsg('assistant', `🔄 Switched to **${data.model}**. ${note}`);
        break;

      case 'prefill':
        inputEl.value = data.text;
        inputEl.focus();
        break;
    }
  });

  // Init — tell extension we're ready
  post('ready');
</script>
</body>
</html>
